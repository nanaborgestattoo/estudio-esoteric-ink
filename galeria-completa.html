    <!-- Pré-conexão e Fontes do DNA Esoteric Ink -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ================= Paleta e Variáveis Oficiais ================= */
        :root {
            --ouro: #c5a059;
            --ouro-claro: #e2c28d;
            --roxo-escuro: #1d0d35;
            --preto: #050108;
            --branco-off: #f4f4f8;
            --cinza-texto: #cccccc;
            --borda-ouro: rgba(197, 160, 89, 0.3);
            
            --fonte-titulo: 'Cinzel', serif;
            --fonte-corpo: 'Lora', serif;
            --fonte-ui: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--preto);
            color: var(--cinza-texto);
            font-family: var(--fonte-corpo);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at top right, var(--roxo-escuro) 0%, transparent 40%);
            padding: 50px 5%;
        }

        /* CABEÇALHO DA GALERIA */
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--borda-ouro);
        }

        .gallery-title {
            font-family: var(--fonte-titulo);
            font-size: clamp(2rem, 4vw, 3rem);
            color: var(--branco-off);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-back {
            color: var(--ouro-claro);
            font-family: var(--fonte-ui);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s ease;
        }

        .btn-back::before {
            content: '←';
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .btn-back:hover { color: var(--branco-off); }
        .btn-back:hover::before { transform: translateX(-5px); }

        /* GRADE DA GALERIA */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px; /* Espaçamento elegante */
        }

        .grid-item {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            overflow: hidden;
            border-radius: 2px;
            border: 1px solid var(--borda-ouro);
            transition: transform 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
            filter: grayscale(20%);
        }

        .grid-item:hover {
            transform: translateY(-8px);
            border-color: var(--ouro);
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.15);
            z-index: 2;
            filter: grayscale(0%);
        }

        /* EFEITOS MÍSTICOS (VINHETA E PELÍCULA ROXA DA MARCA) */
        .grid-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Vinheta Roxa Esoteric Ink */
        .vignette-purple::after {
            background: radial-gradient(circle, transparent 40%, rgba(29, 13, 53, 0.8) 120%);
        }

        /* Película central Esoteric Ink */
        .center-film::after {
            background: rgba(29, 13, 53, 0.5); /* Filtro roxo escuro por cima da foto */
            mix-blend-mode: multiply;
        }

        /* Remove os efeitos ao passar o mouse para dar um "vislumbre" nítido */
        .grid-item:hover::after {
            opacity: 0;
        }

        /* MODAL / LIGHTBOX (FOTO EM TELA CHEIA) */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 1, 8, 0.95); /* Preto da paleta com leve transparência */
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            border: 1px solid var(--borda-ouro);
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            color: var(--ouro);
            font-size: 3rem;
            cursor: pointer;
            font-family: var(--fonte-ui);
            line-height: 1;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .close-btn:hover {
            color: var(--branco-off);
            transform: scale(1.1);
        }

        /* Responsividade do Cabeçalho */
        @media (max-width: 768px) {
            .gallery-header { flex-direction: column; gap: 20px; text-align: center; }
            .btn-back { align-self: center; }
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .close-btn { top: 15px; right: 20px; }
        }

    </style>
</head>

    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">

        <img src="" alt="Arte Tattoo Ampliada" class="lightbox-img" id="lightbox-image">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-image');

        function openLightbox(element) {
            const bgImage = element.style.backgroundImage;
            const imageUrl = bgImage.slice(4, -1).replace(/"/g, ""); 
            lightboxImg.src = imageUrl;
            lightbox.classList.add('active');
        }

        function closeLightbox(event) {
            if (event.target !== lightboxImg) {
                lightbox.classList.remove('active');
                lightboxImg.src = '';
            }
        }

        function forceCloseLightbox() {
            lightbox.classList.remove('active');
            lightboxImg.src = '';
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && lightbox.classList.contains('active')) {
                forceCloseLightbox();
            }
        });
    </script>
